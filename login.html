<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title> 
    <link href="css/estilos.css" rel="stylesheet" type="text/css"/>
</head>
<body>
    <header>
        <img src="imagenes/logodefinitivo.png" alt="Logo de la Empresa"/>
        <nav>
            <ul>
                <li><a href="Index.html">Inicio</a></li>
                <li><a href="galeria.html">Galería</a></li>
            </ul>
        </nav>
    </header>

    <div id="ImagenPrincipal">
        <img src="imagenes/principal.png" alt="Banner Principal" width="100%" height="auto"/>
    </div >

<main>
        <div id="contenedorRecuperar">
            <form action="" method="post">
                <table>
                    <tr>
                        <th align="center" bgcolor="#F3ECE3" style="padding: 25px; border-bottom: 2px solid #876945;">
                            <h2 style="color:#6D411E; margin:0; font-size: 28px;">INICIAR SESIÓN</h2>
                        </th>
                    </tr>

                    <tr>
                        <td class="espaciosCamposForm" style="padding: 25px 30px 10px 30px;">
                            <label><strong>Email</strong></label><br/>
                            <input type="email" id="txtemail" name="txtemail" placeholder="Ej: nombre@correo.com"
                            class="camposForm" style="width: 100%; padding: 12px; margin-top: 8px; border: 2px solid #876945; 
                            box-sizing: border-box; font-size: 16px;"/>
                        </td>
                    </tr>

                    <tr>
                        <td class="espaciosCamposForm" style="padding: 10px 30px 20px 30px;">
                            <label><strong>Password</strong></label><br/>
                            <input type="password" id="txtpass" name="txtpass" class="camposForm" style="width: 100%; padding: 12px; 
                            margin-top: 8px; border: 2px solid #876945; box-sizing: border-box; font-size: 16px;"/>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" class="filasForm" style="padding: 10px 30px 35px 30px;">
                            <input type="submit" id="btnlogin" name="btnlogin" value="Login" class="boton" 
                            style="background-color: #6D411E; color: white; padding: 14px; border: none; font-size: 18px; font-weight: bold; cursor: 
                            pointer; border-radius: 25px; width: 100%; transition: 0.3s;"/>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </main>
    
    <footer>
        <p><strong>DESARROLLADOR:</strong> Danisa Smiliana Gajardo Molina</p>
    </footer>

</body>
</html>
